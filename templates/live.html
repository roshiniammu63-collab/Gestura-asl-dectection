{% extends "base.html" %}
{% block content %}

<h1 style="text-align:center;">Live Sign Detection</h1>

<div style="display:flex; justify-content:center;">
    <canvas id="canvas" style="border:4px solid black; border-radius:20px;"></canvas>
    <video id="video" autoplay playsinline muted style="display:none;"></video>
</div>

<h2 style="text-align:center;">
Prediction: <span id="result">Waiting...</span>
</h2>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");

canvas.width = 640;
canvas.height = 480;

async function startCamera(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({video:true});
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            video.play();
            requestAnimationFrame(loop);
        };

    }catch(err){
        console.error("Camera error:",err);
    }
}

let predictions = [];
function loop(){

    ctx.save();
ctx.scale(-1,1);
ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
ctx.restore();

// BLACK ROI BOX
ctx.strokeStyle = "black";
ctx.lineWidth = 4;

const boxWidth = 300;
const boxHeight = 300;

const x = canvas.width/2 - boxWidth/2;
const y = canvas.height/2 - boxHeight/2;

// draw ROI box
ctx.strokeRect(x, y, boxWidth, boxHeight);

// crop ROI
const roiCanvas = document.createElement("canvas");
roiCanvas.width = boxWidth;
roiCanvas.height = boxHeight;

const roiCtx = roiCanvas.getContext("2d");
roiCtx.drawImage(canvas, x, y, boxWidth, boxHeight, 0, 0, boxWidth, boxHeight);

// resize ROI to model input size
const resizedCanvas = document.createElement("canvas");
resizedCanvas.width = 128;
resizedCanvas.height = 128;

const resizedCtx = resizedCanvas.getContext("2d");
resizedCtx.drawImage(roiCanvas, 0, 0, 128, 128);

// convert to image
const image = resizedCanvas.toDataURL("image/jpeg");

    fetch("/predict",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({image:image})
    })
    .then(res=>res.json())
    .then(data=>{
        predictions.push(data.prediction);

if(predictions.length > 10){
    predictions.shift();
}

let counts = {};
predictions.forEach(p => {
    counts[p] = (counts[p] || 0) + 1;
});

let finalPrediction = Object.keys(counts).reduce((a,b)=>
    counts[a] > counts[b] ? a : b
);

result.innerText = finalPrediction;
    })
    .catch(()=>{
        result.innerText="Error";
    });

    setTimeout(loop,300);
}

startCamera();

</script>

{% endblock %}
