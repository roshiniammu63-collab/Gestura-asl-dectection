<video id="video" width="500" autoplay style="transform: scaleX(-1);"></video>
<canvas id="canvas" style="display:none;"></canvas>

<h2>Prediction: <span id="prediction">Waiting...</span></h2>

<script>

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream=>{
    video.srcObject = stream;
})
.catch(err=>{
    console.log("Camera error",err);
});

function sendFrame(){

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    // BOX SIZE
    const boxSize = 200;

    const x = canvas.width/2 - boxSize/2;
    const y = canvas.height/2 - boxSize/2;

    // draw detection box
    ctx.strokeStyle = "black";
    ctx.lineWidth = 4;
    ctx.strokeRect(x,y,boxSize,boxSize);

    // crop ROI
    const roi = ctx.getImageData(x,y,boxSize,boxSize);

    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = boxSize;
    tempCanvas.height = boxSize;

    const tempCtx = tempCanvas.getContext("2d");
    tempCtx.putImageData(roi,0,0);

    const image = tempCanvas.toDataURL("image/jpeg");

    fetch("/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({image:image})
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("prediction").innerText = data.prediction;
    })
    .catch(err=>{
        document.getElementById("prediction").innerText="Error";
    });

}

setInterval(sendFrame,800);

</script>

</body>
</html>
