<!DOCTYPE html>
<html>
<head>
<title>Live Sign Detection</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#e8d2bf;
}

video{
border:3px solid black;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Live Sign Detection</h1>

<video id="video" width="400" autoplay></video>
<canvas id="canvas" style="display:none;"></canvas>

<h2>Prediction: <span id="prediction">Waiting...</span></h2>

<script>

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
})
.catch(err=>{
console.log("Camera error",err);
});

function sendFrame(){

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.drawImage(video,0,0);

// ROI box
const x = canvas.width/2 - 100;
const y = canvas.height/2 - 100;
const size = 200;

ctx.strokeStyle = "black";
ctx.lineWidth = 4;
ctx.strokeRect(x,y,size,size);

// crop ROI
const roi = ctx.getImageData(x,y,size,size);

const tempCanvas = document.createElement("canvas");
tempCanvas.width = size;
tempCanvas.height = size;

const tempCtx = tempCanvas.getContext("2d");
tempCtx.putImageData(roi,0,0);

const image = tempCanvas.toDataURL("image/jpeg");

fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({image:image})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("prediction").innerText=data.prediction;
});

}

setInterval(sendFrame,800);

</script>

</body>
</html>
