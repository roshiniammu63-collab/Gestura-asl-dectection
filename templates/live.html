<!DOCTYPE html>
<html>
<head>
<title>Live Sign Detection</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#e8d2bf;
}

video{
border:3px solid black;
border-radius:10px;
transform: scaleX(-1);
}

canvas{
display:none;
}
</style>

</head>

<body>

<h1>Live Sign Detection</h1>

<video id="video" width="500" autoplay></video>
<canvas id="canvas"></canvas>

<h2>Prediction: <span id="prediction">Waiting...</span></h2>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
})
.catch(err=>{
console.log(err);
});

function detect(){

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.drawImage(video,0,0);

const boxSize = 200;

const x = canvas.width/2 - boxSize/2;
const y = canvas.height/2 - boxSize/2;

ctx.strokeStyle="black";
ctx.lineWidth=4;
ctx.strokeRect(x,y,boxSize,boxSize);

const roi = ctx.getImageData(x,y,boxSize,boxSize);

const tempCanvas=document.createElement("canvas");
tempCanvas.width=boxSize;
tempCanvas.height=boxSize;

const tempCtx=tempCanvas.getContext("2d");
tempCtx.putImageData(roi,0,0);

const image=tempCanvas.toDataURL("image/jpeg");

fetch("/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({image:image})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("prediction").innerText=data.prediction;
})
.catch(()=>{
document.getElementById("prediction").innerText="Error";
});

}

setInterval(detect,700);

</script>

</body>
</html>
