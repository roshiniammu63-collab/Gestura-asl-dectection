{% extends "base.html" %}
{% block content %}

<h1 style="text-align:center;">Live Sign Detection</h1>

<div style="display:flex; justify-content:center;">
    <canvas id="canvas" style="border:4px solid black; border-radius:20px;"></canvas>
    <video id="video" autoplay playsinline muted style="display:none;"></video>
</div>

<h2 style="text-align:center;">
Prediction: <span id="result">Waiting...</span>
</h2>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");

let stream = null;

async function startCamera(){
    try{

        stream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:false
        });

        video.srcObject = stream;
        await video.play();

        result.innerText = "Detecting...";
        detectLoop();

    }catch(err){

        console.error(err);
        result.innerText = "Camera Permission Denied";

    }
}

startCamera();


function detectLoop(){

    if(video.readyState !== 4){
        requestAnimationFrame(detectLoop);
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    const boxSize = 250;
    const x = canvas.width/2 - boxSize/2;
    const y = canvas.height/2 - boxSize/2;

    ctx.strokeStyle="black";
    ctx.lineWidth=4;
    ctx.strokeRect(x,y,boxSize,boxSize);

    const roiCanvas=document.createElement("canvas");
    roiCanvas.width=boxSize;
    roiCanvas.height=boxSize;

    const roiCtx=roiCanvas.getContext("2d");
    roiCtx.drawImage(canvas,x,y,boxSize,boxSize,0,0,boxSize,boxSize);

    const resizeCanvas=document.createElement("canvas");
    resizeCanvas.width=128;
    resizeCanvas.height=128;

    const resizeCtx=resizeCanvas.getContext("2d");
    resizeCtx.drawImage(roiCanvas,0,0,128,128);

    const image=resizeCanvas.toDataURL("image/jpeg");

    fetch("/predict",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({image:image})
    })
    .then(res=>res.json())
    .then(data=>{
        result.innerText=data.prediction;
    })
    .catch(()=>{
        result.innerText="Prediction Error";
    });

    setTimeout(detectLoop,800);
}

</script>

{% endblock %}
